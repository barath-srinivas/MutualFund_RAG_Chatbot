# Production corpus refresh: 10:00 IST → POST /internal/ingest on Railway API (Chroma volume).
# See docs/ingest-schedule.md
name: Daily corpus refresh (10:00 IST)

on:
  schedule:
    # 04:30 UTC = 10:00 IST (UTC+5:30, no DST)
    - cron: "30 4 * * *"
  workflow_dispatch:

concurrency:
  group: daily-ingest
  cancel-in-progress: false

jobs:
  trigger-railway-ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    permissions:
      contents: read

    steps:
      - name: Trigger ingest on Railway API
        env:
          RAILWAY_API_BASE_URL: ${{ secrets.RAILWAY_API_BASE_URL }}
          INGEST_TRIGGER_SECRET: ${{ secrets.INGEST_TRIGGER_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${RAILWAY_API_BASE_URL:-}" ] || [ -z "${INGEST_TRIGGER_SECRET:-}" ]; then
            echo "::error::Set repository secrets RAILWAY_API_BASE_URL and INGEST_TRIGGER_SECRET (see docs/ingest-schedule.md)"
            exit 1
          fi
          BASE="${RAILWAY_API_BASE_URL%/}"
          case "${BASE}" in
            https://*) ;;
            http://*)
              echo "::error::RAILWAY_API_BASE_URL must use https:// (http:// causes HTTP 301 redirect). Use: https://mutualfundragchatbot-production.up.railway.app"
              exit 1
              ;;
            *)
              echo "::error::RAILWAY_API_BASE_URL must start with https:// (got: ${BASE})"
              exit 1
              ;;
          esac
          URL="${BASE}/internal/ingest"
          echo "POST ${URL}"
          # Full ingest usually takes 30–60+ min. --post301/--post302 keep POST on redirect if needed.
          RESPONSE_FILE="$(mktemp)"
          HTTP_CODE="$(curl -sS --max-time 7200 -L --post301 --post302 -w "%{http_code}" -o "${RESPONSE_FILE}" -X POST "${URL}" \
            -H "Authorization: Bearer ${INGEST_TRIGGER_SECRET}" \
            -H "Content-Type: application/json")"
          echo "HTTP ${HTTP_CODE}"
          cat "${RESPONSE_FILE}"
          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
            echo "::error::Ingest trigger failed (HTTP ${HTTP_CODE}). For 301: set RAILWAY_API_BASE_URL to your Railway https URL with no trailing slash. Also check ENABLE_INTERNAL_INGEST and INGEST_TRIGGER_SECRET."
            exit 1
          fi
          if grep -q '"total_chunks": 0' "${RESPONSE_FILE}" 2>/dev/null; then
            echo "::warning::Ingest finished quickly with total_chunks=0 — see Railway logs for Playwright/fetch errors."
          fi
