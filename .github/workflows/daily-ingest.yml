# Production corpus refresh: 10:00 IST → POST /internal/ingest on Railway API (Chroma volume).
# See docs/ingest-schedule.md
name: Daily corpus refresh (10:00 IST)

on:
  schedule:
    # 04:30 UTC = 10:00 IST (UTC+5:30, no DST)
    - cron: "30 4 * * *"
  workflow_dispatch:

concurrency:
  group: daily-ingest
  cancel-in-progress: false

jobs:
  trigger-railway-ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    permissions:
      contents: read

    steps:
      - name: Trigger ingest on Railway API
        env:
          RAILWAY_API_BASE_URL: ${{ secrets.RAILWAY_API_BASE_URL }}
          INGEST_TRIGGER_SECRET: ${{ secrets.INGEST_TRIGGER_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${RAILWAY_API_BASE_URL:-}" ] || [ -z "${INGEST_TRIGGER_SECRET:-}" ]; then
            echo "::error::Set repository secrets RAILWAY_API_BASE_URL and INGEST_TRIGGER_SECRET (see docs/ingest-schedule.md)"
            exit 1
          fi
          BASE="${RAILWAY_API_BASE_URL%/}"
          case "${BASE}" in
            https://*) ;;
            http://*)
              echo "::error::RAILWAY_API_BASE_URL must use https:// (http:// causes HTTP 301 redirect)."
              exit 1
              ;;
            *)
              echo "::error::RAILWAY_API_BASE_URL must start with https:// (got: ${BASE})"
              exit 1
              ;;
          esac
          URL="${BASE}/internal/ingest"
          STATUS_URL="${BASE}/corpus-status"
          echo "POST ${URL}"
          RESPONSE_FILE="$(mktemp)"
          HTTP_CODE="$(curl -sS --max-time 120 -L --post301 --post302 -w "%{http_code}" -o "${RESPONSE_FILE}" -X POST "${URL}" \
            -H "Authorization: Bearer ${INGEST_TRIGGER_SECRET}" \
            -H "Content-Type: application/json")"
          echo "HTTP ${HTTP_CODE}"
          cat "${RESPONSE_FILE}"
          if [ "${HTTP_CODE}" != "202" ] && [ "${HTTP_CODE}" != "200" ]; then
            echo "::error::Ingest trigger failed (HTTP ${HTTP_CODE}). Check https URL, ENABLE_INTERNAL_INGEST, INGEST_TRIGGER_SECRET, Railway logs."
            exit 1
          fi

          echo "Polling ${STATUS_URL} until last_ingest is set (up to ~120 min)..."
          for attempt in $(seq 1 120); do
            sleep 60
            STATUS="$(curl -sS --max-time 30 "${STATUS_URL}")"
            echo "[$attempt] ${STATUS}"
            # API returns compact JSON (no spaces); do not grep for ': null'
            if ! echo "${STATUS}" | jq -e '.last_ingest != null' >/dev/null; then
              continue
            fi
            CHUNKS="$(echo "${STATUS}" | jq -r '.chunk_count // 0')"
            echo "last_ingest set, chunk_count=${CHUNKS}"
            if [ "${CHUNKS}" -eq 0 ]; then
              echo "::warning::Ingest finished but chunk_count is 0 — check Railway logs for fetch/Playwright errors."
            fi
            exit 0
          done
          echo "::error::Timed out waiting for ingest to finish on Railway. Check Railway logs for corpus-ingest thread."
          exit 1
